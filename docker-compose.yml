version: '3.8'
services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001

  client:
    build:
      context: ./client
      args:
        - VITE_SERVER_URL=http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - server
