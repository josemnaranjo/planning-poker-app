version: '3.8'

services:
  server:
    build: ./server
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - VITE_SERVER_URL=
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
